<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clearhead</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e4df;
    --text-soft: #888;
    --text-faint: #444;
    --accent: #7eb89a;
    --accent-dim: #1e2f27;
    --warn: #c97d4a;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    max-width: 680px;
    padding: 28px 24px 0;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo { font-family: 'Lora', serif; font-size: 20px; color: var(--text); letter-spacing: -0.3px; }
  .logo-dot { color: var(--accent); }
  .tagline { font-size: 12px; color: var(--text-faint); letter-spacing: 0.05em; }

  .messages {
    flex: 1;
    width: 100%;
    max-width: 680px;
    overflow-y: auto;
    padding: 32px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .message { display: flex; flex-direction: column; gap: 4px; animation: fadeUp 0.25s ease forwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .msg-role { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; }
  .message.ai .msg-role  { color: var(--accent); }
  .message.user .msg-role { color: var(--text-faint); }

  .msg-text { font-size: 15px; line-height: 1.75; color: var(--text); font-family: 'Lora', serif; }
  .message.user .msg-text { color: var(--text-soft); font-family: 'Inter', sans-serif; font-size: 14px; }

  .distortion-tag {
    display: inline-flex; align-items: center; gap: 5px;
    background: #2a1f15; color: var(--warn); border: 1px solid #3a2a1a;
    border-radius: 100px; padding: 3px 10px; font-size: 11px; font-weight: 500;
    font-family: 'Inter', sans-serif; margin-top: 6px; width: fit-content;
  }

  .typing { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.4; animation: pulse 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,60%,100% { opacity: 0.4; transform: scale(1); } 30% { opacity: 1; transform: scale(1.3); } }

  .input-area { width: 100%; max-width: 680px; padding: 12px 24px 28px; }

  .input-box {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 12px 14px; transition: border-color 0.2s;
  }
  .input-box:focus-within { border-color: var(--accent); }

  textarea {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text);
    resize: none; line-height: 1.5; min-height: 22px; max-height: 140px;
  }
  textarea::placeholder { color: var(--text-faint); }

  .send-btn {
    width: 32px; height: 32px; border-radius: 8px; background: var(--accent);
    border: none; cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: all 0.15s;
  }
  .send-btn:hover { background: #6aa888; }
  .send-btn:disabled { background: var(--text-faint); cursor: not-allowed; }
  .send-btn svg { width: 14px; height: 14px; fill: #0f0f0f; }

  .hints { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .hint {
    padding: 5px 12px; border-radius: 100px; background: var(--accent-dim);
    color: var(--accent); font-size: 12px; cursor: pointer; border: none;
    font-family: 'Inter', sans-serif; transition: all 0.15s;
  }
  .hint:hover { background: var(--accent); color: #0f0f0f; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <span class="logo">Clearhead<span class="logo-dot">.</span></span>
  <span class="tagline">CBT journal</span>
</header>

<div class="messages" id="messages"></div>

<div class="input-area">
  <div class="input-box">
    <textarea id="input" placeholder="What's on your mind…" rows="1"
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
      onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="hints" id="hints">
    <button class="hint" onclick="fill('I want to work through a thought that\'s been bothering me')">Work through a thought</button>
    <button class="hint" onclick="fill('I\'m feeling anxious right now')">Feeling anxious</button>
    <button class="hint" onclick="fill('I\'m not sure where to start')">Not sure where to start</button>
  </div>
</div>

<script>
const SYSTEM = `You are Clearhead, a warm CBT journaling companion. Guide users through thought records conversationally — never clinical, never robotic.

Your style:
- Warm, calm, unhurried
- Short responses — under 80 words usually
- ONE question at a time, never multiple
- Plain language, not jargon

CBT thought record steps (guide naturally through conversation):
1. Situation — specific event, who/what/when
2. Hot thought — "What was going through your mind?"
3. Emotions — name it, rate intensity 0-100%
4. Evidence for the thought (facts only, not feelings)
5. Evidence against
6. Cognitive distortion — when you spot one, name it naturally AND include exactly: [DISTORTION: Name]
7. Balanced thought — realistic, compassionate alternative
8. Re-rate emotion

Rules:
- If someone expresses suicidal thoughts or crisis, immediately and compassionately provide 988 (Suicide & Crisis Lifeline)
- This is journaling support, not therapy
- Meet people where they are — if they want to vent, let them, then gently offer structure`;

let history = [];
let busy = false;
const TODAY = new Date().toDateString();

window.onload = () => {
  const saved = JSON.parse(localStorage.getItem('clearhead_' + TODAY) || '[]');
  if (saved.length > 0) {
    saved.forEach(m => {
      history.push({ role: m.role, content: m.text });
      renderMessage(m.role, m.text, m.distortion, false);
    });
    document.getElementById('hints').style.display = 'none';
  } else {
    renderMessage('ai', "Hi there. What's been on your mind today — is there a thought or situation you'd like to work through?", null, false);
  }
};

async function send() {
  const ta = document.getElementById('input');
  const text = ta.value.trim();
  if (!text || busy) return;

  document.getElementById('hints').style.display = 'none';
  renderMessage('user', text, null, true);
  history.push({ role: 'user', content: text });
  ta.value = '';
  ta.style.height = 'auto';

  busy = true;
  document.getElementById('sendBtn').disabled = true;
  const typingId = showTyping();

  try {
    const res = await fetch('https://clearhead-server.onrender.com/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });

    const data = await res.json();
    removeTyping(typingId);

    if (data.content?.[0]?.text) {
      let raw = data.content[0].text;
      let distortion = null;
      const dm = raw.match(/\[DISTORTION:\s*([^\]]+)\]/);
      if (dm) { distortion = dm[1].trim(); raw = raw.replace(dm[0], '').trim(); }
      renderMessage('ai', raw, distortion, true);
      history.push({ role: 'assistant', content: raw });
    } else {
      renderMessage('ai', "I'm having trouble connecting. Give it a moment and try again.", null, false);
    }
  } catch (e) {
    removeTyping(typingId);
    renderMessage('ai', "Something went wrong. Please try again.", null, false);
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
}

function renderMessage(role, text, distortion, save) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  const distTag = distortion ? `<div class="distortion-tag">⚠ ${esc(distortion)}</div>` : '';
  div.innerHTML = `<div class="msg-role">${role === 'ai' ? 'Clearhead' : 'You'}</div><div class="msg-text">${esc(text)}${distTag}</div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  if (save) {
    const key = 'clearhead_' + TODAY;
    const msgs = JSON.parse(localStorage.getItem(key) || '[]');
    msgs.push({ role, text, distortion });
    localStorage.setItem(key, JSON.stringify(msgs));
  }
}

function showTyping() {
  const wrap = document.getElementById('messages');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'message ai'; div.id = id;
  div.innerHTML = `<div class="msg-role">Clearhead</div><div class="typing"><span></span><span></span><span></span></div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return id;
}

function removeTyping(id) { document.getElementById(id)?.remove(); }
function fill(text) { const ta = document.getElementById('input'); ta.value = text; ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; ta.focus(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
</script>
</body>
</html>
